# Optional Render Blueprint — or set these in the Render dashboard
services:
  - type: web
    name: jobhunter-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://jobhunter-seven-mu.vercel.app,http://localhost:5173
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: DEBUG
        value: "false"
